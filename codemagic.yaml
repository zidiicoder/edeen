workflows:
  ios-production:
    name: iOS Production Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.hashstack.edeen
      vars:
        BUNDLE_ID: "app.hashstack.edeen"
        XCODE_WORKSPACE: "ios/edeen.xcworkspace"
        XCODE_SCHEME: "edeen"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "Q49TZA5C7A"
        APP_STORE_CONNECT_ISSUER_ID: "5bf05485-6d13-4268-98e5-7c8c63f1f016"
        APP_STORE_CONNECT_PRIVATE_KEY: |
          -----BEGIN PRIVATE KEY-----
          MIGTAgEAMBMGByqGSM49AgEGCCqGSM49AwEHBHkwdwIBAQQgO4kBs5ctb2yNdoza
          6rqbuQxfbit8ruoLcyyh1CYPJUmgCgYIKoZIzj0DAQehRANCAASIAkfgO5Q5O95a
          p1YXGqYboKznVwGdNcTxnnY9anFs7F7yv5t2tgEOILsVXSjAbGCArwhsYLyWdBdl
          a6lUPBVh
          -----END PRIVATE KEY-----
      node: latest
      # Pin to the stable Xcode that React Native 0.80 was built/tested against.
      # "latest" pulls a bleeding-edge Xcode (note Node 26 on the image) whose
      # clang fails to compile RN 0.80's bundled fmt 11.0.2 (fmt/src/format.cc).
      xcode: "16.4"
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps
      
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
      
      - name: Configure Node.js path for Xcode
        script: |
          NODE_PATH=$(command -v node)
          echo "export NODE_BINARY=$NODE_PATH" > ios/.xcode.env.local
          echo "export PATH=$PATH" >> ios/.xcode.env.local
      
      - name: Pre-bundle React Native JS
        script: |
          npx react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios
      
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    
    publishing:
      email:
        recipients:
          - mezidiihun@gmail.com
        notify:
          success: true
          failure: true
      
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true

  android-production:
    name: Android Production Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - edeen_keystore
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.edeen"
      node: latest
      java: 17
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps
      
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      
      - name: Build Android release
        script: |
          cd android
          ./gradlew bundleRelease
    
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
    
    publishing:
      email:
        recipients:
          - mezidiihun@gmail.com
        notify:
          success: true
          failure: true
      
      google_play:
        credentials: $GPLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
