workflows:
  ios-production:
    name: iOS Production Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.hashstack.edeen
      vars:
        BUNDLE_ID: "app.hashstack.edeen"
        XCODE_WORKSPACE: "ios/edeen.xcworkspace"
        XCODE_SCHEME: "edeen"
        APP_STORE_CONNECT_ISSUER_ID: "5bf05485-6d13-4268-98e5-7c8c63f1f016"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "Q49TZA5C7A"
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps
      
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          rm -rf Pods Podfile.lock ~/Library/Caches/CocoaPods
          pod cache clean --all
          pod deintegrate || true
          
          # Fix boost checksum error by patching the podspec
          BOOST_PODSPEC="../node_modules/react-native/third-party-podspecs/boost.podspec"
          if [ -f "$BOOST_PODSPEC" ]; then
            # Remove the sha256 checksum line to skip verification
            sed -i.bak '/source.*:sha256/d' "$BOOST_PODSPEC"
            echo "Patched boost.podspec to skip checksum verification"
          fi
          
          pod install --repo-update --verbose
      
      - name: Clean Xcode build cache
        script: |
          cd ios
          rm -rf ~/Library/Developer/Xcode/DerivedData
          xcodebuild clean -workspace edeen.xcworkspace -scheme edeen
      
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    
    publishing:
      email:
        recipients:
          - mezidiihun@gmail.com
        notify:
          success: true
          failure: true
      
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

  android-production:
    name: Android Production Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - edeen_keystore
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.edeen"
      node: latest
      java: 17
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps
      
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      
      - name: Build Android release
        script: |
          cd android
          ./gradlew bundleRelease
    
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
    
    publishing:
      email:
        recipients:
          - mezidiihun@gmail.com
        notify:
          success: true
          failure: true
      
      google_play:
        credentials: $GPLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
