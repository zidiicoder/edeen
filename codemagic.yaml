workflows:
  ios-production:
    name: iOS Production Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.hashstack.edeen
      vars:
        BUNDLE_ID: "app.hashstack.edeen"
        XCODE_WORKSPACE: "ios/edeen.xcworkspace"
        XCODE_SCHEME: "edeen"
        APP_STORE_CONNECT_ISSUER_ID: "5bf05485-6d13-4268-98e5-7c8c63f1f016"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "Q49TZA5C7A"
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY
      node: latest
      xcode: 16.4
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps
      
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
      
      - name: Set NODE_BINARY and pre-bundle JavaScript
        script: |
          # Write the exact node path into .xcode.env.local (takes priority over .xcode.env)
          NODE_PATH=$(which node)
          echo "export NODE_BINARY=$NODE_PATH" > ios/.xcode.env.local
          echo "✅ NODE_BINARY set to: $NODE_PATH"
          
          # Pre-bundle JS manually so Xcode's bundle phase can be skipped cleanly.
          # This also surfaces any Metro/JS errors early with full output.
          $NODE_PATH node_modules/.bin/react-native bundle \
            --platform ios \
            --dev false \
            --entry-file index.js \
            --bundle-output ios/main.jsbundle \
            --assets-dest ios \
            --verbose
          echo "✅ JS bundle created at ios/main.jsbundle"
      
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      
      - name: Build iOS app
        script: |
          # SKIP_BUNDLING=1 tells react-native-xcode.sh to skip Metro bundling
          # since we already pre-bundled above. This avoids the restricted-shell
          # NODE_BINARY issue in Xcode's script phase.
          export SKIP_BUNDLING=1
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    
    publishing:
      email:
        recipients:
          - mezidiihun@gmail.com
        notify:
          success: true
          failure: true
      
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

  android-production:
    name: Android Production Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - edeen_keystore
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.edeen"
      node: latest
      java: 17
    scripts:
      - name: Install npm dependencies
        script: |
          npm install --legacy-peer-deps
      
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      
      - name: Build Android release
        script: |
          cd android
          ./gradlew bundleRelease
    
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
    
    publishing:
      email:
        recipients:
          - mezidiihun@gmail.com
        notify:
          success: true
          failure: true
      
      google_play:
        credentials: $GPLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
