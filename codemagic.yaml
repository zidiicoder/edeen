workflows:
  ios-production:
    name: iOS Production Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.hashstack.edeen
      vars:
        BUNDLE_ID: "app.hashstack.edeen"
        XCODE_WORKSPACE: "ios/edeen.xcworkspace"
        XCODE_SCHEME: "edeen"
        APP_STORE_CONNECT_ISSUER_ID: "5bf05485-6d13-4268-98e5-7c8c63f1f016"
        APP_STORE_CONNECT_KEY_IDENTIFIER: "Q49TZA5C7A"
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY
      node: latest
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod repo update
          pod deintegrate
          pod install --repo-update
      
      - name: Patch fmt library for Xcode compatibility
        script: |
          cd ios/Pods/fmt/src
          if [ -f "format.cc" ]; then
            chmod +w format.cc
            cat > format_patched.cc << 'EOF'
#pragma clang diagnostic push
#pragma clang diagnostic ignored "-Wdeprecated-declarations"
#pragma clang diagnostic ignored "-Wdeprecated"
EOF
            cat format.cc >> format_patched.cc
            echo "" >> format_patched.cc
            echo "#pragma clang diagnostic pop" >> format_patched.cc
            mv format_patched.cc format.cc
            echo "✅ Patched fmt/src/format.cc successfully"
          fi
      
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    
    publishing:
      email:
        recipients:
          - mezidiihun@gmail.com
        notify:
          success: true
          failure: true
      
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        submit_to_app_store: false

  android-production:
    name: Android Production Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      android_signing:
        - edeen_keystore
      groups:
        - google_play
      vars:
        PACKAGE_NAME: "com.edeen"
      node: latest
      java: 17
    scripts:
      - name: Install npm dependencies
        script: |
          npm install
      
      - name: Set up local.properties
        script: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      
      - name: Build Android release
        script: |
          cd android
          ./gradlew bundleRelease
    
    artifacts:
      - android/app/build/outputs/**/*.aab
      - android/app/build/outputs/**/*.apk
    
    publishing:
      email:
        recipients:
          - mezidiihun@gmail.com
        notify:
          success: true
          failure: true
      
      google_play:
        credentials: $GPLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
        submit_as_draft: true
